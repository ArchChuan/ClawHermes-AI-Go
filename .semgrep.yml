rules:
  - id: no-hardcoded-secrets
    pattern-either:
      - pattern: |
          password = "..."
      - pattern: |
          api_key = "..."
      - pattern: |
          secret = "..."
    message: "Hardcoded secrets detected"
    languages: [go]
    severity: ERROR

  - id: sql-injection-risk
    pattern: |
      fmt.Sprintf("SELECT * FROM %s WHERE id = %s", ...)
    message: "Potential SQL injection vulnerability"
    languages: [go]
    severity: WARNING

  - id: unsafe-deserialization
    pattern-either:
      - pattern: |
          json.Unmarshal(...)
      - pattern: |
          gob.Decode(...)
    message: "Unsafe deserialization detected"
    languages: [go]
    severity: WARNING

  - id: missing-error-handling
    pattern: |
      _, err := $FUNC(...)
      if err != nil {
      }
    message: "Error is ignored"
    languages: [go]
    severity: WARNING

  - id: insecure-random
    pattern-either:
      - pattern: |
          rand.Intn(...)
      - pattern: |
          rand.Int63(...)
    message: "Use crypto/rand instead of math/rand for security"
    languages: [go]
    severity: WARNING

  - id: missing-input-validation
    pattern: |
      func $FUNC($ARG string) {
        ...
      }
    message: "Input validation missing"
    languages: [go]
    severity: INFO
