<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32" fill="none">
  <!-- Background -->
  <rect width="32" height="32" rx="8" fill="#1677ff"/>
  <!-- Robot head -->
  <rect x="8" y="10" width="16" height="12" rx="3" fill="white" opacity="0.95"/>
  <!-- Eyes -->
  <circle cx="12.5" cy="16" r="2" fill="#1677ff"/>
  <circle cx="19.5" cy="16" r="2" fill="#1677ff"/>
  <!-- Eye glow -->
  <circle cx="12.5" cy="16" r="1" fill="white"/>
  <circle cx="19.5" cy="16" r="1" fill="white"/>
  <!-- Antenna -->
  <line x1="16" y1="10" x2="16" y2="6" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
  <circle cx="16" cy="5" r="1.5" fill="#40c8ff"/>
  <!-- Claw fingers -->
  <path d="M10 22 Q8 26 6 28" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M13 23 Q12 27 11 29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M16 23 L16 29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M19 23 Q20 27 21 29" stroke="white" stroke-width="2" stroke-linecap="round"/>
  <path d="M22 22 Q24 26 26 28" stroke="white" stroke-width="2" stroke-linecap="round"/>
</svg>
