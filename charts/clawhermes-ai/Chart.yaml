apiVersion: v2
name: clawhermes-ai
description: A Helm chart for ClawHermes AI Go application
type: application
version: 1.0.0
appVersion: "1.0.0"
keywords:
  - ai
  - agent
  - rag
  - knowledge
  - llm
maintainers:
  - name: ClawHermes Team
    email: team@clawhermes.ai
home: https://github.com/byteBuilderX/ClawHermes-AI-Go
sources:
  - https://github.com/byteBuilderX/ClawHermes-AI-Go
icon: https://raw.githubusercontent.com/byteBuilderX/ClawHermes-AI-Go/main/assets/logo.png

dependencies:
  - name: nats
    version: 1.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: nats.enabled
  - name: neo4j
    version: 5.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: neo4j.enabled
  - name: milvus
    version: 4.x.x
    repository: https://charts.bitnami.com/bitnami
    condition: milvus.enabled