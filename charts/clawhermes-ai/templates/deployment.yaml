apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "clawhermes-ai.fullname" . }}
  labels:
    {{- include "clawhermes-ai.labels" . | nindent 4 }}
    app: {{ include "clawhermes-ai.name" . }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      app: {{ include "clawhermes-ai.name" . }}
  template:
    metadata:
      annotations:
        checksum/config: {{ include (print $.Template.BasePath "/configmap.yaml") . | sha256sum }}
        checksum/secret: {{ include (print $.Template.BasePath "/secret.yaml") . | sha256sum }}
        {{- if .Values.prometheus.enabled }}
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.prometheus.port }}"
        prometheus.io/path: "{{ .Values.prometheus.path }}"
        {{- end }}
      labels:
        app: {{ include "clawhermes-ai.name" . }}
        {{- include "clawhermes-ai.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "clawhermes-ai.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.containerSecurityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: {{ .Values.app.port }}
              protocol: TCP
            {{- if .Values.app.grpcPort }}
            - name: grpc
              containerPort: {{ .Values.app.grpcPort }}
              protocol: TCP
            {{- end }}
          env:
            - name: PORT
              value: "{{ .Values.app.port }}"
            - name: LOG_LEVEL
              value: "{{ .Values.app.logLevel }}"
            - name: ENVIRONMENT
              value: "{{ .Values.app.environment }}"
            - name: NATS_URL
              value: "{{ .Values.config.natsURL }}"
            - name: MILVUS_HOST
              value: "{{ .Values.config.milvusHost }}"
            - name: MILVUS_PORT
              value: "{{ .Values.config.milvusPort }}"
            - name: NEO4J_URI
              value: "{{ .Values.config.neo4jURI }}"
            - name: NEO4J_USER
              value: "{{ .Values.config.neo4jUser }}"
            {{- if .Values.otel.enabled }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: "{{ .Values.otel.endpoint }}"
            - name: OTEL_SERVICE_NAME
              value: "{{ .Values.otel.serviceName }}"
            - name: OTEL_EXPORTER_TYPE
              value: "{{ .Values.otel.exporterType }}"
            - name: OTEL_SAMPLING_RATIO
              value: "{{ .Values.otel.samplingRatio | toString }}"
            {{- end }}
            - name: NEO4J_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawhermes-ai.fullname" . }}-secrets
                  key: neo4jPassword
            - name: OPENAI_API_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawhermes-ai.fullname" . }}-secrets
                  key: openaiApiKey
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: {{ include "clawhermes-ai.fullname" . }}-secrets
                  key: jwtSecret
            - name: POD_NAME
              valueFrom:
                fieldRef:
                  fieldPath: metadata.name
            - name: POD_NAMESPACE
              valueFrom:
                fieldRef:
                  fieldPath: metadata.namespace
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          {{- if .Values.healthCheck.enabled }}
          livenessProbe:
            {{- toYaml .Values.healthCheck.livenessProbe | nindent 12 }}
          readinessProbe:
            {{- toYaml .Values.healthCheck.readinessProbe | nindent 12 }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}