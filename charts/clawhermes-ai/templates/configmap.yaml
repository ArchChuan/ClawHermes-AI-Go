apiVersion: v1
kind: ConfigMap
metadata:
  name: {{ include "clawhermes-ai.fullname" . }}-config
  labels:
    {{- include "clawhermes-ai.labels" . | nindent 4 }}
data:
  PORT: "{{ .Values.app.port }}"
  LOG_LEVEL: "{{ .Values.app.logLevel }}"
  ENVIRONMENT: "{{ .Values.app.environment }}"
  NATS_URL: "{{ .Values.config.natsURL }}"
  NATS_CLUSTER_ID: "{{ .Values.config.natsClusterID }}"
  MILVUS_HOST: "{{ .Values.config.milvusHost }}"
  MILVUS_PORT: "{{ .Values.config.milvusPort }}"
  NEO4J_URI: "{{ .Values.config.neo4jURI }}"
  NEO4J_USER: "{{ .Values.config.neo4jUser }}"
  {{- if .Values.otel.enabled }}
  OTEL_EXPORTER_OTLP_ENDPOINT: "{{ .Values.otel.endpoint }}"
  OTEL_SERVICE_NAME: "{{ .Values.otel.serviceName }}"
  OTEL_EXPORTER_TYPE: "{{ .Values.otel.exporterType }}"
  OTEL_SAMPLING_RATIO: "{{ .Values.otel.samplingRatio | toString }}"
  {{- end }}
  {{- if .Values.prometheus.enabled }}
  PROMETHEUS_ENABLED: "true"
  PROMETHEUS_PATH: "{{ .Values.prometheus.path }}"
  {{- end }}