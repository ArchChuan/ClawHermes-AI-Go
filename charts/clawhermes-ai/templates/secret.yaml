apiVersion: v1
kind: Secret
metadata:
  name: {{ include "clawhermes-ai.fullname" . }}-secrets
  labels:
    {{- include "clawhermes-ai.labels" . | nindent 4 }}
type: Opaque
stringData:
  neo4jPassword: {{ .Values.secrets.neo4jPassword | quote }}
  openaiApiKey: {{ .Values.secrets.openaiApiKey | quote }}
  jwtSecret: {{ .Values.secrets.jwtSecret | quote }}
  mcpSecretKey: {{ .Values.secrets.mcpSecretKey | quote }}