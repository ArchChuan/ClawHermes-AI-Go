apiVersion: v1
kind: Service
metadata:
  name: {{ include "clawhermes-ai.fullname" . }}
  labels:
    {{- include "clawhermes-ai.labels" . | nindent 4 }}
  annotations:
    {{- toYaml .Values.service.annotations | nindent 4 }}
spec:
  type: {{ .Values.service.type }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: http
      protocol: TCP
      name: http
    {{- if .Values.app.grpcPort }}
    - port: {{ .Values.service.grpcPort }}
      targetPort: grpc
      protocol: TCP
      name: grpc
    {{- end }}
  selector:
    app: {{ include "clawhermes-ai.name" . }}