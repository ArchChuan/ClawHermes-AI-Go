image:
  repository: ghcr.io/byteBuilderX/clawhermes-ai
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 3

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "512Mi"
    cpu: "200m"
  limits:
    memory: "2Gi"
    cpu: "2000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

environment: production

config:
  PORT: "8080"
  LOG_LEVEL: "warn"
  ENVIRONMENT: "prod"
  NATS_URL: "nats://nats:4222"
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "clawhermes-ai-prod"
  OTEL_EXPORTER_TYPE: "otlp"
  OTEL_SAMPLING_RATIO: "0.1"

healthCheck:
  liveness:
    initialDelaySeconds: 45
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readiness:
    initialDelaySeconds: 20
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

podDisruptionBudget:
  enabled: true
  minAvailable: 1

affinity:
  podAntiAffinity:
    preferredDuringSchedulingIgnoredDuringExecution:
      - weight: 100
        podAffinityTerm:
          labelSelector:
            matchExpressions:
              - key: app
                operator: In
                values:
                  - clawhermes-ai
          topologyKey: kubernetes.io/hostname

tolerations: []

nodeSelector:
  node-type: worker
