# Default values for ClawHermes AI Go
# This is a YAML-formatted file.

global:
  imagePullSecrets: []
  imageRegistry: ""

# 应用镜像配置
image:
  repository: clawhermes-ai
  tag: latest
  pullPolicy: IfNotPresent

# 副本数量
replicaCount: 3

# 应用配置
app:
  port: 8080
  grpcPort: 9090
  logLevel: info
  environment: production

# OpenTelemetry 配置
otel:
  enabled: true
  exporterType: otlp
  serviceName: clawhermes-ai
  samplingRatio: 0.1
  endpoint: otel-collector:4317

# Prometheus 配置
prometheus:
  enabled: true
  path: /metrics
  port: 8080

# Service 配置
service:
  type: ClusterIP
  port: 80
  grpcPort: 9090
  annotations:
    prometheus.io/scrape: "true"
    prometheus.io/port: "8080"
    prometheus.io/path: "/metrics"

# Ingress 配置
ingress:
  enabled: true
  className: nginx
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "10m"
  hosts:
    - host: api.clawhermes.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: clawhermes-tls
      hosts:
        - api.clawhermes.example.com

# 资源配置
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 1000m
    memory: 1Gi

# 自动伸缩配置
autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

# 健康检查配置
healthCheck:
  enabled: true
  livenessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 30
    periodSeconds: 10
    timeoutSeconds: 5
    failureThreshold: 3
  readinessProbe:
    httpGet:
      path: /health
      port: http
    initialDelaySeconds: 10
    periodSeconds: 5
    timeoutSeconds: 3
    failureThreshold: 3

# Pod 配置
podSecurityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

containerSecurityContext:
  allowPrivilegeEscalation: false
  capabilities:
    drop:
      - ALL

# Node 配置
nodeSelector: {}

# 容忍配置
tolerations: []

# 亲和性配置
affinity: {}

# Pod 中断预算
podDisruptionBudget:
  enabled: true
  minAvailable: 1

# ServiceAccount 配置
serviceAccount:
  create: true
  annotations: {}

# 依赖服务配置
nats:
  enabled: false

neo4j:
  enabled: false

milvus:
  enabled: false

# Secret 配置
secrets:
  neo4jPassword: "change-me-in-production"
  openaiApiKey: "sk-***"
  jwtSecret: "change-me-in-production"
  mcpSecretKey: "change-me-in-production"

# ConfigMap 配置
config:
  natsURL: "nats://nats:4222"
  natsClusterID: "clawhermes-cluster"
  milvusHost: "milvus"
  milvusPort: "19530"
  neo4jURI: "bolt://neo4j:7687"
  neo4jUser: "neo4j"

# 监控配置
monitoring:
  serviceMonitor:
    enabled: true
    interval: 30s
    scrapeTimeout: 10s
  podMonitor:
    enabled: true
    interval: 30s

# 网络策略配置
networkPolicy:
  enabled: true

# 资源配额配置
resourceQuota:
  enabled: true
  requests:
    cpu: "4"
    memory: "4Gi"
  limits:
    cpu: "8"
    memory: "8Gi"

# 限制范围配置
limitRange:
  enabled: true
  default:
    cpu: "500m"
    memory: "512Mi"
  defaultRequest:
    cpu: "100m"
    memory: "128Mi"
  max:
    cpu: "2"
    memory: "2Gi"
  min:
    cpu: "50m"
    memory: "64Mi"