image:
  repository: ghcr.io/byteBuilderX/clawhermes-ai
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 2

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "256Mi"
    cpu: "100m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 5
  targetCPUUtilizationPercentage: 70
  targetMemoryUtilizationPercentage: 80

environment: staging

config:
  PORT: "8080"
  LOG_LEVEL: "info"
  ENVIRONMENT: "staging"
  NATS_URL: "nats://nats:4222"
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "clawhermes-ai-staging"
  OTEL_EXPORTER_TYPE: "otlp"
  OTEL_SAMPLING_RATIO: "0.5"

healthCheck:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 15
    periodSeconds: 5

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

podDisruptionBudget:
  enabled: true
  minAvailable: 1

tolerations: []

nodeSelector: {}
