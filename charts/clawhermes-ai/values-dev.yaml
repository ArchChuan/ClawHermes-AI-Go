image:
  repository: ghcr.io/byteBuilderX/clawhermes-ai
  tag: latest
  pullPolicy: IfNotPresent

replicaCount: 1

service:
  type: ClusterIP
  port: 80
  targetPort: 8080

resources:
  requests:
    memory: "128Mi"
    cpu: "50m"
  limits:
    memory: "512Mi"
    cpu: "500m"

autoscaling:
  enabled: false

environment: development

config:
  PORT: "8080"
  LOG_LEVEL: "debug"
  ENVIRONMENT: "dev"
  NATS_URL: "nats://nats:4222"
  MILVUS_HOST: "milvus"
  MILVUS_PORT: "19530"
  NEO4J_URI: "bolt://neo4j:7687"
  NEO4J_USER: "neo4j"
  OTEL_EXPORTER_OTLP_ENDPOINT: "http://otel-collector:4317"
  OTEL_SERVICE_NAME: "clawhermes-ai-dev"
  OTEL_EXPORTER_TYPE: "otlp"
  OTEL_SAMPLING_RATIO: "1.0"

healthCheck:
  liveness:
    initialDelaySeconds: 30
    periodSeconds: 10
  readiness:
    initialDelaySeconds: 10
    periodSeconds: 5

securityContext:
  runAsNonRoot: true
  runAsUser: 1000
  fsGroup: 1000

tolerations: []

nodeSelector: {}
