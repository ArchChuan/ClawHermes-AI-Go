codecov:
  require_ci_to_pass: yes
  precision: 2
  round: down
  layout: "reach,diff,flags,tree"
  show_motion: yes
  browser_extension_header: no

coverage:
  precision: 2
  round: down
  range: "70...100"

ignore:
  - "**/*_test.go"
  - "**/mock_*.go"
  - "vendor"

flags:
  unittests:
    carryforward: yes
    paths:
      - "internal"
      - "pkg"
      - "api"

comment:
  layout: "reach,diff,flags,tree"
  behavior: default
  require_changes: no
  require_base: no
  require_head: yes
  hide_project_coverage: no

github:
  require_ci_to_pass: yes
